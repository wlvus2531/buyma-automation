<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BUYMA 자동화</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #f5f5f4;
      color: #1c1917;
      font-size: 13px;
    }

    /* 헤더 */
    .header {
      background: #1c1917;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-icon {
      width: 28px; height: 28px;
      background: #fff; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #1c1917; font-weight: bold;
    }
    .header-title { font-size: 14px; font-weight: 600; }
    .header-sub { font-size: 10px; color: #a8a29e; margin-top: 1px; }

    /* 탭 */
    .tabs {
      display: flex;
      border-bottom: 1px solid #e7e5e4;
      background: #fff;
    }
    .tab-btn {
      flex: 1; padding: 8px 0;
      border: none; background: none;
      font-size: 11px; font-weight: 600;
      color: #78716c; cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab-btn.active { color: #1c1917; border-bottom-color: #1c1917; }

    /* 패널 */
    .panel { display: none; }
    .panel.active { display: block; }

    /* 통계 */
    .stats {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; padding: 10px;
    }
    .stat-card {
      background: #fff; border-radius: 10px;
      padding: 8px; text-align: center;
      border: 1px solid #e7e5e4;
    }
    .stat-num { font-size: 20px; font-weight: 700; color: #1c1917; }
    .stat-num.alert { color: #dc2626; }
    .stat-label { font-size: 10px; color: #78716c; margin-top: 1px; }

    /* 알림 목록 */
    .section { padding: 0 10px 10px; }
    .section-title {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #78716c; margin-bottom: 5px;
    }
    .alert-list { display: flex; flex-direction: column; gap: 5px; }
    .alert-item {
      background: #fff; border: 1px solid #fca5a5;
      border-radius: 8px; padding: 7px 9px; font-size: 11px;
    }
    .alert-item .aname { font-weight: 600; color: #991b1b; }
    .alert-item .adetail { color: #78716c; font-size: 10px; margin-top: 1px; }

    /* 자동 입력 패널 */
    .autofill-list { padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .af-item {
      background: #fff; border: 1px solid #e7e5e4;
      border-radius: 10px; padding: 9px 10px;
    }
    .af-name { font-weight: 600; color: #1c1917; font-size: 12px; }
    .af-jp { font-size: 10px; color: #78716c; margin-top: 1px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .af-meta { display: flex; gap: 6px; font-size: 10px; color: #a8a29e; }
    .af-price { font-weight: 600; color: #1c1917; }

    .empty-state { text-align: center; color: #a8a29e; font-size: 11px; padding: 16px; }

    /* 상태 */
    .status-row {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-top: 1px solid #e7e5e4;
      font-size: 10px; color: #78716c;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot.ok { background: #22c55e; }
    .dot.err { background: #dc2626; }

    /* 버튼 */
    .btn {
      display: block; width: calc(100% - 20px);
      margin: 0 10px 10px; padding: 7px;
      background: #1c1917; color: #fff;
      border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; text-align: center; text-decoration: none;
    }
    .btn:hover { background: #292524; }

    /* 설정 */
    .config { padding: 6px 10px 10px; border-top: 1px solid #e7e5e4; }
    .config label { display: block; font-size: 10px; color: #78716c; margin-bottom: 3px; }
    .config input {
      width: 100%; border: 1px solid #d6d3d1;
      border-radius: 6px; padding: 5px 8px;
      font-size: 11px; color: #1c1917; background: #fff;
    }
    .config input:focus { outline: none; border-color: #1c1917; }
    .save-msg { font-size: 10px; color: #22c55e; margin-top: 3px; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">B</div>
    <div>
      <div class="header-title">BUYMA 운영 자동화</div>
      <div class="header-sub">모니터링 V1 · 자동 입력 V2</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="research">🔍 리서치</button>
    <button class="tab-btn" data-tab="monitor">📡 모니터링</button>
    <button class="tab-btn" data-tab="autofill">✏️ 자동 입력</button>
    <button class="tab-btn" data-tab="settings">⚙️ 설정</button>
  </div>

  <!-- 리서치 수집 탭 (V4 P1) -->
  <div class="panel active" id="panel-research">
    <div class="section" style="padding: 10px 10px 4px;">
      <div class="section-title">오늘의 리서치 미션</div>
      <p style="font-size:10px;color:#a8a29e;margin:2px 0 6px;">바이마를 순회하며 찜·조회수·등록일 데이터를 실측 수집합니다 (미션당 4~6초 간격)</p>
    </div>
    <div class="section">
      <div id="research-status" class="empty-state">대기 중</div>
      <div class="alert-list" id="research-results"></div>
    </div>
    <button class="btn" id="research-start-btn">🔍 수집 시작</button>
    <button class="btn" id="research-stop-btn" style="display:none;background:#dc2626;">■ 중지</button>
  </div>

  <!-- 모니터링 탭 -->
  <div class="panel" id="panel-monitor">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">-</div>
        <div class="stat-label">오늘 수집</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-sellers">-</div>
        <div class="stat-label">셀러 수</div>
      </div>
      <div class="stat-card">
        <div class="stat-num alert" id="stat-alerts">-</div>
        <div class="stat-label">알림</div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">최근 알림</div>
      <div class="alert-list" id="alert-list">
        <div class="empty-state">알림 없음</div>
      </div>
    </div>
    <a class="btn" id="dashboard-btn" href="#" target="_blank">대시보드 열기 →</a>
  </div>

  <!-- 자동 입력 탭 -->
  <div class="panel" id="panel-autofill">
    <div class="section" style="padding: 10px 10px 4px;">
      <div class="section-title">등록 예정 상품 <span id="af-count" style="color:#1c1917;">로딩 중</span></div>
      <p style="font-size:10px;color:#a8a29e;margin-top:2px;margin-bottom:6px;">BUYMA 상품 등록 페이지에서 자동으로 폼이 채워집니다</p>
    </div>
    <div class="autofill-list" id="autofill-list">
      <div class="empty-state">불러오는 중...</div>
    </div>
    <a class="btn" id="register-btn" href="#" target="_blank">등록 워크플로우 열기 →</a>
  </div>

  <!-- 설정 탭 -->
  <div class="panel" id="panel-settings">
    <div class="config" style="padding-top:10px;">
      <label>API URL</label>
      <input type="text" id="api-url-input" placeholder="https://buyma-automation-vi3y.vercel.app" />
      <div class="save-msg" id="save-msg">저장됨 ✓</div>
    </div>
    <div class="config">
      <label>수집기 키 (CRON_SECRET)</label>
      <input type="password" id="collector-key-input" placeholder="리서치 수집 인증 키" />
      <div class="save-msg" id="key-save-msg">저장됨 ✓</div>
    </div>
    <div class="status-row">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">연결 확인 중...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
